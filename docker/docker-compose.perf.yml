services:
  pgmqtt:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5432:5432"
      - "1883:1883"
      - "8080:8080"
      - "9001:9001"
    environment:
      POSTGRES_PASSWORD: postgres
    command: 
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pgmqtt,pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "max_connections=1000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && curl -f http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    command:
      - "--extend.query-path=/etc/postgres-exporter/queries.yaml"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@pgmqtt:5432/postgres?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/postgres-exporter/queries.yaml"
    volumes:
      - ./postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml
    ports:
      - "9187:9187"
    depends_on:
      pgmqtt:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - postgres-exporter

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # Load generator service (to be run manually or via script)
  loadgen:
    image: emqx/emqtt-bench:latest
    entrypoint: ["/usr/bin/tail", "-f", "/dev/null"]
    depends_on:
      pgmqtt:
        condition: service_healthy
