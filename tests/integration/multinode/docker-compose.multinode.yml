services:
  pg_primary:
    build:
      context: ../../../
      dockerfile: docker/Dockerfile
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./init-hba.sh:/docker-entrypoint-initdb.d/02-init-hba.sh
    command: >
      postgres
      -c wal_level=logical 
      -c max_wal_senders=10 
      -c max_replication_slots=10 
      -c hot_standby=on

  pg_replica:
    build:
      context: ../../../
      dockerfile: docker/Dockerfile
    environment:
      POSTGRES_PASSWORD: postgres
      PGPASSWORD: postgres
    ports:
      - "8081:8080"
    depends_on:
      - pg_primary
    entrypoint: ["bash", "-c"]
    command:
      - |
        rm -rf /var/lib/postgresql/data/*
        until pg_basebackup -h pg_primary -D /var/lib/postgresql/data -U postgres -vP; do
          echo 'Waiting for primary...'
          sleep 1
        done
        touch /var/lib/postgresql/data/standby.signal
        echo "primary_conninfo = 'host=pg_primary port=5432 user=postgres password=postgres'" >> /var/lib/postgresql/data/postgresql.auto.conf
        chown -R postgres:postgres /var/lib/postgresql/data
        chmod 700 /var/lib/postgresql/data
        exec gosu postgres postgres
