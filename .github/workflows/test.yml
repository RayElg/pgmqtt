name: basic testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest paho-mqtt psycopg2-binary

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: |
          cd tests/integration
          npm install

      - name: Build and start environment
        run: |
          docker compose up -d --build

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U postgres; do sleep 2; done'

      - name: Run Python integration tests
        run: |
          python -m pytest tests/integration/

      - name: Run WebSocket integration tests
        run: |
          python tests/integration/test_websocket_runner.py

      - name: Shutdown environment
        if: always()
        run: |
          docker compose down
