name: basic testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout paho-mqtt psycopg2-binary

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start environment
        run: |
          docker compose build --build-arg BUILDKIT_INLINE_CACHE=1
          docker compose up -d
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 120 bash -c 'until docker compose exec -T postgres pg_isready -U postgres; do
            echo "--- container status ---"
            docker compose ps
            echo "--- logs (last 20) ---"
            docker compose logs --tail=20 postgres
            sleep 2
          done'

      - name: Run integration tests
        timeout-minutes: 30
        run: |
          python -m pytest tests/integration/ -m "not slow" --timeout=60 -v

      - name: Run performance tests
        timeout-minutes: 15
        run: |
          python -m pytest tests/integration/ -m slow --timeout=120 -v -s 2>&1 | tee perf_output.txt

      - name: Performance results summary
        if: always()
        run: |
          echo "## Performance Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "PERF |" perf_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No perf results found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs postgres

      - name: Shutdown environment
        if: always()
        run: |
          docker compose down
