name: basic testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout paho-mqtt psycopg2-binary

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: |
          cd tests/integration
          npm install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start environment
        run: |
          docker compose build --build-arg BUILDKIT_INLINE_CACHE=1
          docker compose up -d
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 120 bash -c 'until docker compose exec -T postgres pg_isready -U postgres; do
            echo "--- container status ---"
            docker compose ps
            echo "--- logs (last 20) ---"
            docker compose logs --tail=20 postgres
            sleep 2
          done'

      - name: Run Python integration tests
        timeout-minutes: 30
        run: |
          python -m pytest tests/integration/ --timeout=60 -v

      - name: Run WebSocket integration tests
        run: |
          python tests/integration/test_websocket_runner.py

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs postgres

      - name: Shutdown environment
        if: always()
        run: |
          docker compose down
